<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VIC Log Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b0f;
      --panel: #11161d;
      --panel-2: #151c25;
      --line: #28313d;
      --text: #dce5ee;
      --muted: #8d9baa;
      --accent: #2ed3b7;
      --info: #72a7ff;
      --warn: #ffd166;
      --error: #ff5c6c;
      --debug: #9b8cff;
      --ok: #49e68a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #0c1016;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 720;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .path {
      color: var(--accent);
      font-family: "Cascadia Mono", Consolas, monospace;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) repeat(4, auto);
      gap: 10px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 128px 160px 132px 132px;
      gap: 10px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: #0d1218;
    }

    input, select, button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }

    input, select {
      padding: 0 10px;
      width: 100%;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { border-color: var(--accent); }
    button.primary { background: #12352f; border-color: #1d6c5d; color: #ddfff7; }
    button.danger { background: #31161b; border-color: #74303b; color: #ffd6dc; }

    .drop {
      border: 1px dashed #395163;
      background: #0f151d;
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .drop.active {
      border-color: var(--accent);
      color: var(--text);
      background: #10211f;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 1fr));
      gap: 8px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #0d1218;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
    }

    main {
      min-height: 0;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #1b242e;
      padding: 9px 10px;
      vertical-align: top;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #101720;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    tr:hover td { background: #101820; }

    .col-time { width: 188px; }
    .col-level { width: 84px; }
    .col-source { width: 210px; }
    .col-actions { width: 92px; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 22px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      border: 1px solid currentColor;
    }

    .level-error { color: var(--error); }
    .level-warn { color: var(--warn); }
    .level-info { color: var(--info); }
    .level-debug { color: var(--debug); }

    .message {
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wrap .message {
      white-space: pre-wrap;
      overflow: visible;
      text-overflow: clip;
    }

    details {
      margin-top: 6px;
    }

    summary {
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    pre {
      margin: 8px 0 0;
      max-height: 280px;
      overflow: auto;
      padding: 10px;
      border: 1px solid #26313c;
      border-radius: 6px;
      background: #070a0e;
      color: #bfd3e6;
      font: 12px/1.5 "Cascadia Mono", Consolas, monospace;
    }

    .empty {
      padding: 46px 22px;
      color: var(--muted);
      text-align: center;
    }

    .small {
      min-height: 28px;
      padding: 0 8px;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: none;
      max-width: 360px;
      padding: 10px 12px;
      border: 1px solid #267567;
      border-radius: 6px;
      background: #0e211d;
      color: #d9fff6;
      font-size: 13px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.32);
    }

    .toast.show { display: block; }

    @media (max-width: 920px) {
      .toolbar, .filters, .stats { grid-template-columns: 1fr 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .col-source { display: none; }
      th.col-source, td.col-source { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>VIC Log Viewer</h1>
        <div class="sub">Open logs from <span class="path" id="defaultPath">C:\Users\ghost\AppData\Roaming\vic-tactical-pc\logs\vic-YYYY-MM-DD.jsonl</span></div>
      </div>
      <div class="sub" id="fileStatus">No log loaded</div>
    </header>

    <section class="toolbar">
      <label class="drop" id="dropZone">
        Drop JSONL logs here or choose files
        <input id="fileInput" type="file" accept=".jsonl,.log,.txt,application/json" multiple hidden />
      </label>
      <button class="primary" id="pickButton">Open Log File</button>
      <button id="copyVisibleButton">Copy Filtered</button>
      <button id="exportJsonlButton">Export JSONL</button>
      <button id="exportCsvButton">Export CSV</button>
    </section>

    <section class="filters">
      <input id="searchInput" type="search" placeholder="Search message, source, stack, JSON..." />
      <select id="levelFilter">
        <option value="all">All levels</option>
        <option value="error">Errors</option>
        <option value="warn">Warnings</option>
        <option value="info">Info</option>
        <option value="debug">Debug</option>
      </select>
      <input id="sourceFilter" type="search" placeholder="Source filter" />
      <button id="toggleWrapButton">Wrap Off</button>
      <button class="danger" id="clearButton">Clear</button>
    </section>

    <section class="stats">
      <div class="stat"><span>Total</span><strong id="totalCount">0</strong></div>
      <div class="stat"><span>Filtered</span><strong id="filteredCount">0</strong></div>
      <div class="stat"><span>Errors</span><strong id="errorCount">0</strong></div>
      <div class="stat"><span>Warnings</span><strong id="warnCount">0</strong></div>
      <div class="stat"><span>Files</span><strong id="fileCount">0</strong></div>
    </section>

    <main id="tableWrap">
      <div class="empty">Load a `vic-*.jsonl` file to inspect captured Electron, Chrome console, renderer, preload, and main-process errors.</div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      entries: [],
      filtered: [],
      files: [],
      wrap: false,
    };

    const els = {
      fileInput: document.getElementById('fileInput'),
      pickButton: document.getElementById('pickButton'),
      dropZone: document.getElementById('dropZone'),
      searchInput: document.getElementById('searchInput'),
      levelFilter: document.getElementById('levelFilter'),
      sourceFilter: document.getElementById('sourceFilter'),
      toggleWrapButton: document.getElementById('toggleWrapButton'),
      clearButton: document.getElementById('clearButton'),
      copyVisibleButton: document.getElementById('copyVisibleButton'),
      exportJsonlButton: document.getElementById('exportJsonlButton'),
      exportCsvButton: document.getElementById('exportCsvButton'),
      fileStatus: document.getElementById('fileStatus'),
      tableWrap: document.getElementById('tableWrap'),
      toast: document.getElementById('toast'),
      totalCount: document.getElementById('totalCount'),
      filteredCount: document.getElementById('filteredCount'),
      errorCount: document.getElementById('errorCount'),
      warnCount: document.getElementById('warnCount'),
      fileCount: document.getElementById('fileCount'),
    };

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove('show'), 1800);
    }

    function normalizeEntry(raw, index, fileName, lineNumber) {
      const level = String(raw.level || 'info').toLowerCase();
      const data = raw.data || {};
      return {
        id: `${fileName}:${lineNumber}:${index}`,
        fileName,
        lineNumber,
        ts: raw.ts || raw.time || raw.timestamp || '',
        level: ['error', 'warn', 'info', 'debug'].includes(level) ? level : 'info',
        source: raw.source || data.source || data.sourceUrl || '',
        message: raw.message || data.message || JSON.stringify(raw),
        data,
        raw,
      };
    }

    function parseJsonl(text, fileName) {
      const entries = [];
      const lines = text.split(/\r?\n/);
      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i].trim();
        if (!line) continue;
        try {
          entries.push(normalizeEntry(JSON.parse(line), entries.length, fileName, i + 1));
        } catch (error) {
          entries.push(normalizeEntry({
            level: 'error',
            message: `Invalid JSONL at line ${i + 1}: ${error.message}`,
            data: { line },
          }, entries.length, fileName, i + 1));
        }
      }
      return entries;
    }

    function entryText(entry) {
      return [
        entry.ts,
        entry.level,
        entry.source,
        entry.message,
        JSON.stringify(entry.data),
        JSON.stringify(entry.raw),
      ].join(' ').toLowerCase();
    }

    function filterEntries() {
      const query = els.searchInput.value.trim().toLowerCase();
      const level = els.levelFilter.value;
      const source = els.sourceFilter.value.trim().toLowerCase();
      state.filtered = state.entries.filter((entry) => {
        if (level !== 'all' && entry.level !== level) return false;
        if (source && !entry.source.toLowerCase().includes(source)) return false;
        if (query && !entryText(entry).includes(query)) return false;
        return true;
      });
      render();
    }

    function formatTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      els.totalCount.textContent = state.entries.length;
      els.filteredCount.textContent = state.filtered.length;
      els.errorCount.textContent = state.entries.filter((entry) => entry.level === 'error').length;
      els.warnCount.textContent = state.entries.filter((entry) => entry.level === 'warn').length;
      els.fileCount.textContent = state.files.length;
      els.fileStatus.textContent = state.files.length ? state.files.join(', ') : 'No log loaded';

      if (!state.filtered.length) {
        els.tableWrap.innerHTML = '<div class="empty">No matching log entries.</div>';
        return;
      }

      els.tableWrap.classList.toggle('wrap', state.wrap);
      els.tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="col-time">Time</th>
              <th class="col-level">Level</th>
              <th class="col-source">Source</th>
              <th>Message</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${state.filtered.map((entry, index) => `
              <tr>
                <td class="col-time">${escapeHtml(formatTime(entry.ts))}<div class="sub">${escapeHtml(entry.fileName)}:${entry.lineNumber}</div></td>
                <td class="col-level"><span class="badge level-${entry.level}">${escapeHtml(entry.level)}</span></td>
                <td class="col-source">${escapeHtml(entry.source || '-')}</td>
                <td>
                  <div class="message">${escapeHtml(entry.message)}</div>
                  <details>
                    <summary>details</summary>
                    <pre>${escapeHtml(JSON.stringify(entry.raw, null, 2))}</pre>
                  </details>
                </td>
                <td class="col-actions"><button class="small" data-copy-index="${index}">Copy</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      els.tableWrap.querySelectorAll('[data-copy-index]').forEach((button) => {
        button.addEventListener('click', () => {
          const entry = state.filtered[Number(button.dataset.copyIndex)];
          copyText(JSON.stringify(entry.raw, null, 2), 'Copied log entry');
        });
      });
    }

    async function loadFiles(files) {
      const list = Array.from(files || []);
      if (!list.length) return;
      const loaded = [];
      for (const file of list) {
        const text = await file.text();
        loaded.push(...parseJsonl(text, file.name));
      }
      state.entries = loaded.sort((a, b) => String(a.ts).localeCompare(String(b.ts)));
      state.files = list.map((file) => file.name);
      filterEntries();
      showToast(`Loaded ${state.entries.length} entries`);
    }

    function toJsonl(entries) {
      return entries.map((entry) => JSON.stringify(entry.raw)).join('\n') + (entries.length ? '\n' : '');
    }

    function toCsv(entries) {
      const rows = [['time', 'level', 'source', 'message', 'file', 'line']];
      for (const entry of entries) {
        rows.push([formatTime(entry.ts), entry.level, entry.source, entry.message, entry.fileName, entry.lineNumber]);
      }
      return rows.map((row) => row.map((cell) => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
    }

    async function copyText(text, message) {
      await navigator.clipboard.writeText(text);
      showToast(message);
    }

    function download(name, type, text) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    els.pickButton.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', () => loadFiles(els.fileInput.files));
    els.searchInput.addEventListener('input', filterEntries);
    els.levelFilter.addEventListener('change', filterEntries);
    els.sourceFilter.addEventListener('input', filterEntries);
    els.clearButton.addEventListener('click', () => {
      state.entries = [];
      state.filtered = [];
      state.files = [];
      els.searchInput.value = '';
      els.sourceFilter.value = '';
      els.levelFilter.value = 'all';
      render();
    });

    els.toggleWrapButton.addEventListener('click', () => {
      state.wrap = !state.wrap;
      els.toggleWrapButton.textContent = state.wrap ? 'Wrap On' : 'Wrap Off';
      render();
    });

    els.copyVisibleButton.addEventListener('click', () => {
      copyText(toJsonl(state.filtered), `Copied ${state.filtered.length} filtered entries`);
    });

    els.exportJsonlButton.addEventListener('click', () => {
      download('vic-filtered-logs.jsonl', 'application/x-ndjson', toJsonl(state.filtered));
    });

    els.exportCsvButton.addEventListener('click', () => {
      download('vic-filtered-logs.csv', 'text/csv', toCsv(state.filtered));
    });

    ['dragenter', 'dragover'].forEach((eventName) => {
      els.dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        els.dropZone.classList.add('active');
      });
    });

    ['dragleave', 'drop'].forEach((eventName) => {
      els.dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        els.dropZone.classList.remove('active');
      });
    });

    els.dropZone.addEventListener('drop', (event) => loadFiles(event.dataTransfer.files));
  </script>
</body>
</html>
